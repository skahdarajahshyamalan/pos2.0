version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: pos-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laravel-net

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: pos-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-net
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: pos-db
    restart: unless-stopped
    ports:
      - "33066:3306"
    environment:
      MYSQL_DATABASE: pos_db
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: pos_password
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
      # Automatically initialize database with the SQL dump
      - ./atpoxise_posdemoatp.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - laravel-net

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: pos-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 100M
    networks:
      - laravel-net
    depends_on:
      - db

networks:
  laravel-net:
    driver: bridge

volumes:
  dbdata:
    driver: local
